name: Daily News Digest

on:
  schedule:
    - cron: "30 1 * * *"

  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - name: Run News Bot
        env:
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python news_bot.py